<!DOCTYPE html>
<html>
<head>
    <title>CSV File Update</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
        }
        .container {
            max-width: 400px;
            margin: 100px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h2 {
            margin-top: 0;
        }
        form {
            margin-top: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="email"],
        input[type="text"],
        input[type="submit"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid crimson;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input[type="submit"] {
            background-color: crimson;
            color: #fff;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Update CSV File</h2>
        <form method="post" action="/admin/create">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required><br>
            <input type="submit" value="Submit">
        </form>
    </div>
</body>
</html>
